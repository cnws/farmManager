name: Node.js CI Build

# 修复了这里的 YAML 语法格式（使用列表模式更清晰且不容易出错）
on:
  push:
    branches: 
      - main
      - master
  pull_request:
    branches: 
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Environment Variables
        run: |
          if [ -f ".env.example" ]; then
            cp .env.example .env
          fi

      # 如果你没有提交 package-lock.json，请把 npm ci 改成 npm install
      - name: Install dependencies
        run: npm install

      - name: Start Database Services
        run: docker compose up -d

      - name: Wait for database to be ready
        run: sleep 10

      - name: Run Database Migrations
        run: npm run db:migrate

      - name: Populate database with seed data
        run: |
          # （可选排错）列出项目根目录和 scripts 目录下的内容，如果又报错了可以在日志里看它到底在哪
          ls -la
          ls -la scripts/ || true
          ls -la src/scripts/ || true
          
          # 执行正确的路径（去掉了 src/）
          npx tsx scripts/init-db.ts

      # 增加编译步骤：将 TypeScript 编译成 JavaScript
      - name: Build project
        run: npm run build

      # 将编译后的产物上传为 Artifact
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: farm-manager-dist        # 下载时显示的产物压缩包名称
          path: dist/                    # ⚠️重要：请确认你的编译输出文件夹名字。如果是 build/ 请改为 build/
          retention-days: 7              # Artifact 保存天数，默认最长 90 天，可按需修改
